# Build static site and deploy to GitHub Pages (Settings → Pages → Source: GitHub Actions).
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute public path
        id: base
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: bun build ./index.html --outdir=dist --minify --sourcemap --public-path="${{ steps.base.outputs.path }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
